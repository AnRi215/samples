services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - ${VW_HOST_PORT}:80
    environment:
      LOG_LEVEL: debug
      LOG_FILE: ${VW_LOG_FILE}
      TZ: Europe/Berlin
      DOMAIN: ${VW_DOMAIN}
      WEBSOCKET_ENABLED: ${VW_WS_ENABLED}
      SIGNUPS_ALLOWED: ${VW_SIGNUPS_ALLOWED}
      INVITATIONS_ALLOWED: ${VW_INVITATIONS_ALLOWED}
      INVITATION_ORG_NAME: ${VW_INVITATION_ORG_NAME}
      LOGIN_RATELIMIT_MAX_BURST: ${VW_LOGIN_RATELIMIT_MAX_BURST}
      LOGIN_RATELIMIT_SECONDS: ${VW_LOGIN_RATELIMIT_SECONDS}
      EXPERIMENTAL_CLIENT_FEATURE_FLAGS: ${VW_EXPERIMENTAL_FLAGS}
      ADMIN_TOKEN: ${VW_ADMIN_TOKEN}
      DATABASE_URL: mysql://${VW_DB_USER}:${VW_DB_PASS}@${VW_DB_HOST}:3306/${VW_DB_NAME}
      DATABASE_MAX_CONNS: "10"
      SMTP_HOST: ${VW_SMTP_HOST}
      SMTP_FROM: ${VW_SMTP_FROM}
      SMTP_FROM_NAME: ${VW_SMTP_FROM_NAME}
      SMTP_SECURITY: ${VW_SMTP_SECURITY}
      SMTP_PORT: ${VW_SMTP_PORT}
      SMTP_USERNAME: ${VW_SMTP_USERNAME}
      SMTP_PASSWORD: ${VW_SMTP_PASSWORD}
      SMTP_TIMEOUT: ${VW_SMTP_TIMEOUT}
      SMTP_AUTH_MECHANISM: ${VW_SMTP_AUTH_MECHANISM}
      ADMIN_RATELIMIT_SECONDS: ${VW_ADMIN_RATELIMIT_SECONDS}
      ADMIN_RATELIMIT_MAX_BURST: ${VW_ADMIN_RATELIMIT_MAX_BURST}
      USE_REAL_IP: ${VW_USE_REAL_IP}
      IP_HEADER: ${VW_IP_HEADER}
    volumes:
      - ./data:/data
    healthcheck:
      test:
        - CMD
        - "true"
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
networks: {}
